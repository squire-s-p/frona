name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare standalone
        run: |
          mkdir -p build/.next
          cp -r .next/standalone/* build/
          cp -r .next/standalone/.next build/
          cp -r public build/ || echo "No public dir"
          cp -r .next/static build/.next/static

      - name: Archive
        run: tar -czf build.tar.gz build

      - name: Upload
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "build.tar.gz"
          target: "/root"

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            source ~/.bashrc || source ~/.profile
            rm -rf /root/app
            mkdir /root/app

            tar -xzf /root/build.tar.gz -C /root/app
            rm /root/build.tar.gz

            cp /root/frona/.env /root/app/build/.env
            if [ ! -f "/root/app/build/.env" ]; then echo "FATAL: .env file NOT found!"; exit 1; fi

            cd /root/app/build

            pm2 delete dashboard || true
            pm2 start server.js --name dashboard --update-env

            pm2 save