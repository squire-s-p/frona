name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare bundle
        run: |
          mkdir -p deploy
          cp -r .next/standalone/* deploy/
          cp -r .next/standalone/.next deploy/
          cp -r public deploy/ || echo "No public dir"
          cp -r .next/static deploy/.next/static
          cp -r prisma deploy/
          cp package.json deploy/

      - name: Archive
        run: tar -czf deploy.tar.gz -C deploy .

      - name: Upload to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/root"

      - name: Execute Remote Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # 1. Підготовка папки
            rm -rf /root/app_new
            mkdir -p /root/app_new
            tar -xzf /root/deploy.tar.gz -C /root/app_new
            rm /root/deploy.tar.gz

            # 2. Копіюємо конфіг (беремо з робочої папки frona)
            cp /root/frona/.env /root/app_new/.env

            # 3. Оновлення бази даних (автоматично!)
            cd /root/app_new
            npx prisma db push --accept-data-loss || echo "Prisma push failed, but continuing..."

            # 4. Рокіровка папок та перезапуск
            rm -rf /root/app_old
            [ -d "/root/app" ] && mv /root/app /root/app_old
            mv /root/app_new /root/app
            
            cd /root/app
            pm2 delete dashboard || true
            pm2 start server.js --name dashboard --update-env
            pm2 save